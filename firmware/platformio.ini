[env:esp32cam]
platform = espressif32
board = esp32cam
framework = arduino
monitor_speed = 115200
lib_deps =
  me-no-dev/ESPAsyncWebServer
  me-no-dev/AsyncTCP
  knolleary/PubSubClient
  bblanchon/ArduinoJson
  espressif/esp32-camera
build_flags =
  -DASYNC_WEBSERVER_SSL_ENABLED=0
  -DBOARD_HAS_PSRAM
  -mfix-esp32-psram-cache-issue
