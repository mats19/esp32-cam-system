[platformio]
# Definition der Verzeichnisstruktur für die getrennte Firmware-Haltung
src_dir = firmware/src
include_dir = firmware/include
lib_dir = firmware/lib
test_dir = firmware/test
data_dir = firmware/data

[env:esp32cam]
platform = espressif32
board = esp32cam
framework = arduino
monitor_speed = 115200

# Bibliotheken für Kamera, MQTT, JSON und Webserver
lib_deps =
    me-no-dev/ESPAsyncWebServer
    me-no-dev/AsyncTCP
    knolleary/PubSubClient
    bblanchon/ArduinoJson
    espressif/esp32-camera

# Build-Konfiguration für ESP32-CAM (PSRAM Support & Bugfixes)
build_flags =
    -DASYNC_WEBSERVER_SSL_ENABLED=0
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue